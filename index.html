<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#05a13c">
<title>Green Screen — VFX Trackers</title>
<style>
  :root{
    --panel:#1b1e25; --card:#20242c; --line:#31363f;
    --accent:#c6f52f; --text:#e9ecf1; --muted:#8b909b;
  }
  html,body{height:100vh; overscroll-behavior:none;}
  html{touch-action:manipulation;}
  body{
    margin:0; overflow:hidden; background:#000;
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    -webkit-user-select:none; user-select:none;
    -webkit-tap-highlight-color:transparent;
  }

  /* ---------- Stage ---------- */
  #stage{
    position:fixed; inset:0;
    background:#05a13c;
    transition:background .25s;
  }
  .marker{
    position:absolute; transform:translate(-50%,-50%);
    pointer-events:none;
  }
  .marker svg{display:block;}

  /* ---------- Scrim ---------- */
  #scrim{
    position:fixed; inset:0; background:transparent;
    display:none;
  }

  /* ---------- Bottom sheet ---------- */
  #panel{
    position:fixed; left:0; right:0; bottom:0; z-index:10;
    background:var(--panel); color:var(--text);
    border-radius:22px 22px 0 0;
    max-height:72dvh;
    transform:translateY(105%);
    transition:transform .32s cubic-bezier(.32,.72,.25,1);
    display:flex; flex-direction:column;
    box-shadow:0 -12px 40px rgba(0,0,0,.45);
  }
  #panel.open{transform:translateY(0);}
  #panelHead{
    flex:0 0 auto; position:relative; padding:10px 20px 0;
  }
  .handle{
    width:44px; height:5px; border-radius:3px;
    background:#0c0e12; margin:4px auto 0;
  }
  #closeBtn{
    position:absolute; top:18px; right:16px; z-index:2;
    width:44px; height:44px; border:0; border-radius:12px;
    background:transparent; color:var(--accent);
    font-size:0; cursor:pointer;
  }
  #closeBtn svg{width:22px; height:22px;}
  #panelBody{
    flex:1 1 auto; overflow-y:auto; overscroll-behavior:contain;
    -webkit-overflow-scrolling:touch;
    padding:6px 20px calc(28px + env(safe-area-inset-bottom));
  }
  h2{
    color:var(--accent); font-size:17px; font-weight:700;
    letter-spacing:.01em; margin:22px 0 14px;
    display:flex; justify-content:space-between; align-items:baseline;
  }
  h2:first-child{margin-top:10px;}
  h2 .val{color:var(--muted); font-size:13px; font-weight:600; font-variant-numeric:tabular-nums;}

  /* swatches */
  .swatches{display:flex; gap:14px; flex-wrap:wrap;}
  .swatch{
    width:46px; height:46px; border-radius:50%;
    border:0; padding:0; cursor:pointer; flex:0 0 auto;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);
    transition:transform .12s;
  }
  .swatch:active{transform:scale(.92);}
  .swatch.sel{
    box-shadow:0 0 0 3px var(--panel), 0 0 0 6px var(--accent);
  }
  .swatch.rainbow{
    position:relative; overflow:hidden;
    background:
      radial-gradient(circle at 50% 50%, #fff 0 14%, transparent 16%),
      conic-gradient(#ff0040,#ff8000,#ffee00,#37ff00,#00e0ff,#2a37ff,#c400ff,#ff0040);
  }
  .swatch.rainbow input{
    position:absolute; inset:0; width:100%; height:100%;
    opacity:0; padding:0; border:0; cursor:pointer;
  }

  /* marker types */
  .types{display:flex; gap:10px; justify-content:space-between;}
  .typeBtn{
    flex:1 1 0; aspect-ratio:1/1; max-width:66px;
    background:transparent; border:2px solid transparent; border-radius:16px;
    padding:10px; cursor:pointer; transition:transform .12s;
  }
  .typeBtn:active{transform:scale(.92);}
  .typeBtn.sel{border-color:var(--accent); background:var(--card);}
  .typeBtn svg{width:100%; height:100%; display:block;}

  /* slider */
  input[type=range]{
    -webkit-appearance:none; appearance:none;
    width:100%; height:34px; background:transparent; margin:0;
  }
  input[type=range]::-webkit-slider-runnable-track{
    height:7px; border-radius:4px; background:#0c0e12;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none; appearance:none;
    width:52px; height:32px; border-radius:16px;
    background:var(--accent); margin-top:-12.5px;
    box-shadow:0 2px 8px rgba(0,0,0,.4);
  }
  input[type=range]::-moz-range-track{height:7px; border-radius:4px; background:#0c0e12;}
  input[type=range]::-moz-range-thumb{
    width:52px; height:32px; border-radius:16px; border:0; background:var(--accent);
  }

  /* patterns */
  .patterns{display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  .patBtn{
    position:relative; aspect-ratio:1/1.05;
    background:var(--panel); border:1.5px solid var(--line); border-radius:16px;
    cursor:pointer; padding:0; transition:transform .12s;
  }
  .patBtn:active{transform:scale(.96);}
  .patBtn.sel{border-color:var(--accent); box-shadow:0 0 0 1px var(--accent);}
  .patBtn .pm{
    position:absolute; transform:translate(-50%,-50%); pointer-events:none;
  }
  .patBtn .pm svg{display:block; width:20px; height:20px;}

  /* keyboard + hint */
  .kbtn{
    width:100%; padding:16px; border:0; border-radius:16px;
    background:var(--accent); color:#12140a;
    font-size:16px; font-weight:700; cursor:pointer;
    font-family:inherit;
  }
  .kbtn:active{filter:brightness(.9);}
  .kbtn.alt{
    background:var(--card); color:var(--text);
    border:1.5px solid var(--line); font-weight:600;
    margin-top:10px;
  }
  .hint{
    color:var(--muted); font-size:13px; line-height:1.55;
    text-align:center; margin:20px 0 0;
  }
  .hint b{color:var(--text); font-weight:600;}

  /* keyboard input: technically visible (so iOS shows no input-preview capsule),
     but fully transparent to the eye */
  #kb{
    position:fixed; bottom:0; left:0; width:100%; height:44px;
    border:0; padding:0 12px; margin:0; pointer-events:none;
    background:transparent; color:transparent;
    -webkit-text-fill-color:transparent; caret-color:transparent;
    font-size:16px; outline:none;
  }

  /* replica iOS keyboard — palettes follow the system light/dark mode */
  #fakekb{
    --kbBg:rgba(18,19,22,.58);
    --keyBg:rgba(255,255,255,.24);
    --fnBg:rgba(255,255,255,.115);
    --keyText:#fff;
    --fnPress:rgba(255,255,255,.4);
    --popBg:rgba(255,255,255,.44);
    --keyShadow:0 1px 0 rgba(0,0,0,.35);
    position:fixed; left:4px; right:4px; bottom:4px; z-index:9;
    padding:14px 4px calc(4px + env(safe-area-inset-bottom));
    background:var(--kbBg);
    -webkit-backdrop-filter:blur(30px) saturate(160%);
    backdrop-filter:blur(30px) saturate(160%);
    border-radius:30px;
    transform:translateY(120%);
    transition:transform .3s cubic-bezier(.32,.72,.25,1);
  }
  @media (prefers-color-scheme: light){
    #fakekb{
      --kbBg:rgba(203,206,212,.75);
      --keyBg:#ffffff;
      --fnBg:#a9aeba;
      --keyText:#000;
      --fnPress:#ffffff;
      --popBg:#ffffff;
      --keyShadow:0 1px 0 #898a8d;
    }
  }
  #fakekb.show{transform:translateY(0);}
  .kbrow{display:flex; gap:6px; padding:0 4px; margin-bottom:11px;}
  .key{
    flex:1 1 0; height:clamp(42px,11.5vw,56px);
    display:flex; align-items:center; justify-content:center;
    background:var(--keyBg); color:var(--keyText);
    border:0; border-radius:13px; padding:0;
    font-family:inherit; font-size:24px; font-weight:400;
    box-shadow:var(--keyShadow);
    -webkit-tap-highlight-color:transparent;
  }
  .key.dim{background:var(--fnBg); font-size:16px; font-weight:500;}
  .key.dim.press{background:var(--fnPress);}
  .key.space.press{filter:brightness(.8);}
  .key.wide{flex:1.35;}
  .key.space{flex:3.2; font-size:16px;}
  .key.ret{flex:1.55; background:#0a84ff; color:#fff;}
  .key.ret.press{filter:brightness(.75);}
  .key.mode{flex:1.55;}
  .key svg{width:23px; height:23px;}
  /* iOS 26 key pop: the key stretches upward into one continuous shape */
  .kpop{position:absolute; z-index:3; pointer-events:none;}
  .kbextras{display:flex; justify-content:space-between; padding:6px 24px 0;}
  .kbextras svg{width:26px; height:26px; opacity:.92; color:var(--keyText);}

  /* toast */
  #toast{
    position:fixed; top:calc(20px + env(safe-area-inset-top)); left:50%;
    transform:translate(-50%,-16px); z-index:20;
    background:rgba(16,18,23,.92); color:var(--text);
    padding:12px 20px; border-radius:100px;
    font-size:14px; font-weight:600; white-space:nowrap;
    opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s;
    box-shadow:0 6px 24px rgba(0,0,0,.4);
  }
  #toast.show{opacity:1; transform:translate(-50%,0);}
  #toast .lock{color:var(--accent);}

  @media (prefers-reduced-motion: reduce){
    #panel,#toast,.swatch,.typeBtn,.patBtn{transition:none;}
  }
</style>
</head>
<body>

<div id="stage"></div>
<div id="scrim"></div>

<div id="panel">
  <div id="panelHead">
    <div class="handle"></div>
    <button id="closeBtn" aria-label="Close settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.2" stroke-linecap="round"><path d="M5 5l14 14M19 5L5 19"/></svg>
    </button>
  </div>
  <div id="panelBody">
    <h2>Background</h2>
    <div class="swatches" id="bgRow"></div>

    <h2>Marker Color</h2>
    <div class="swatches" id="mkRow"></div>

    <h2>Marker Type</h2>
    <div class="types" id="typeRow"></div>

    <h2>Marker Size <span class="val" id="sizeVal"></span></h2>
    <input type="range" id="sizeSlider" min="16" max="90" step="1">

    <h2>Choose Pattern</h2>
    <div class="patterns" id="patGrid"></div>

    <h2>Density <span class="val" id="densityVal"></span></h2>
    <input type="range" id="densitySlider" min="1" max="6" step="1">

    <h2>Keyboard</h2>
    <button id="kbFakeBtn" class="kbtn">Replica Keyboard &mdash; no capsule</button>
    <button id="kbBtn" class="kbtn alt">System Keyboard</button>

    <p class="hint">
      <b>Tap</b> the screen to open settings.<br>
      <b>3-finger tap</b> to lock / unlock the interface while filming.
      <br>v8
    </p>
  </div>
</div>

<input id="kb" type="text" name="chroma-note" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" enterkeyhint="done" aria-hidden="true" tabindex="-1">
<div id="fakekb" aria-hidden="true"></div>
<input type="color" id="bgPicker">
<input type="color" id="mkPicker">
<div id="toast"></div>

<script>
(function(){
  'use strict';

  var COLORS = ['#05a13c','#0d3cc9','#000000','#2b2b2b','#ffffff'];

  var PATTERN_MOTIFS = {
    corners4: [[10,7],[90,7],[10,93],[90,93]],
    corners5: [[10,7],[90,7],[10,93],[90,93],[50,50]],
    single:   [[50,50]]
  };
  var PATTERN_ORDER = ['corners4','corners5','single'];
  var TYPES = ['cross','x','dot','tracker','checker'];

  /* evenly spaced positions (px) across [0,totalPx], first/last inset by marginPx */
  function evenPositionsPx(count, marginPx, totalPx){
    if (count <= 1) return [totalPx / 2];
    var step = (totalPx - marginPx * 2) / (count - 1);
    var arr = [];
    for (var i = 0; i < count; i++) arr.push(marginPx + i * step);
    return arr;
  }

  /* column x-positions derived from screen WIDTH, then however many rows are
     needed to fill the full HEIGHT top-to-bottom using that same spacing
     (snapped to the row count that matches closest) */
  function axisPositions(cols, marginPercentOfWidth, W, H){
    var marginPx = (marginPercentOfWidth / 100) * W;
    var xs = evenPositionsPx(cols, marginPx, W);
    var stepPx = cols > 1 ? (xs[1] - xs[0]) : 0;
    var rows = 1;
    if (stepPx > 0){
      var span = H - marginPx * 2;
      var raw = span / stepPx;
      var lo = Math.max(1, Math.floor(raw)), hi = Math.max(1, Math.ceil(raw));
      var loStep = span / lo, hiStep = span / hi;
      var intervals = Math.abs(loStep - stepPx) <= Math.abs(hiStep - stepPx) ? lo : hi;
      rows = intervals + 1;
    }
    var ys = evenPositionsPx(rows, marginPx, H);
    return {xs: xs, ys: ys};
  }

  function crossProduct(xs, ys, W, H){
    var pts = [];
    ys.forEach(function(y){
      xs.forEach(function(x){
        pts.push([x / W * 100, y / H * 100]);
      });
    });
    return pts;
  }

  /* one point at the center of every 2x2 cell formed by adjacent grid lines */
  function cellCenters(xs, ys, W, H){
    var pts = [];
    for (var j = 0; j < ys.length - 1; j++){
      for (var i = 0; i < xs.length - 1; i++){
        pts.push([(xs[i] + xs[i+1]) / 2 / W * 100, (ys[j] + ys[j+1]) / 2 / H * 100]);
      }
    }
    return pts;
  }

  function gridPoints(cols, marginPercentOfWidth, W, H){
    var axes = axisPositions(cols, marginPercentOfWidth, W, H);
    return crossProduct(axes.xs, axes.ys, W, H);
  }

  /* corners4/corners5: 2*density points per axis, margin fixed at 10% of width.
     corners5 also gets a center cross in the middle of every group of 4.
     single: density points per axis, margin = half a cell (cell-centered). */
  function patternPoints(name, density, W, H){
    var n = Math.max(1, density || 1);
    if (name === 'single') return gridPoints(n, 50 / n, W, H);
    var axes = axisPositions(2 * n, 10, W, H);
    var pts = crossProduct(axes.xs, axes.ys, W, H);
    if (name === 'corners5') pts = pts.concat(cellCenters(axes.xs, axes.ys, W, H));
    return pts;
  }

  var state = {
    bg: '#05a13c',
    mk: '#000000',
    type: 'cross',
    size: 38,
    pattern: 'corners5',
    density: 1,
    customBg: '#ff6a00',
    customMk: '#ff6a00'
  };
  var saved = null;
  try { saved = JSON.parse(localStorage.getItem('gs-settings')); } catch(e){}
  var firstRun = !saved;
  if (saved) for (var k in state) if (saved[k] !== undefined) state[k] = saved[k];
  if (!PATTERN_MOTIFS[state.pattern]) state.pattern = 'corners5';

  var locked = false;
  var kbActive = false;
  var lastMulti = 0;

  var stage = document.getElementById('stage');
  var panel = document.getElementById('panel');
  var scrim = document.getElementById('scrim');
  var kb = document.getElementById('kb');
  var fakekb = document.getElementById('fakekb');
  var toastEl = document.getElementById('toast');
  var sizeSlider = document.getElementById('sizeSlider');
  var sizeVal = document.getElementById('sizeVal');
  var densitySlider = document.getElementById('densitySlider');
  var densityVal = document.getElementById('densityVal');
  var bgPicker = document.getElementById('bgPicker');
  var mkPicker = document.getElementById('mkPicker');

  function save(){
    try { localStorage.setItem('gs-settings', JSON.stringify(state)); } catch(e){}
  }

  /* ---------- marker SVG ---------- */
  function complementFor(color){
    var c = color.replace('#','');
    if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
    var r=parseInt(c.substr(0,2),16), g=parseInt(c.substr(2,2),16), b=parseInt(c.substr(4,2),16);
    var hex = function(n){ return (255-n).toString(16).padStart(2,'0'); };
    return '#' + hex(r) + hex(g) + hex(b);
  }
  function markerSVG(type, color){
    var s = '<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">';
    if (type === 'cross'){
      s += '<path d="M50 4V96M4 50H96" stroke="'+color+'" stroke-width="9"/>';
    } else if (type === 'x'){
      s += '<path d="M17 17L83 83M83 17L17 83" stroke="'+color+'" stroke-width="9"/>';
    } else if (type === 'dot'){
      s += '<circle cx="50" cy="50" r="38" fill="'+color+'"/>';
    } else if (type === 'tracker'){
      s += '<circle cx="50" cy="50" r="43" fill="none" stroke="'+color+'" stroke-width="6"/>'
        +  '<path d="M50 18 L80 70 L20 70 Z" fill="none" stroke="'+color+'" stroke-width="5" stroke-linejoin="round"/>'
        +  '<path d="M50 42V58M42 50H58" stroke="'+color+'" stroke-width="4.5"/>';
    } else if (type === 'checker'){
      var ct = complementFor(color);
      s += '<circle cx="50" cy="50" r="45" fill="'+ct+'"/>'
        +  '<path d="M50 50 L50 5 A45 45 0 0 1 95 50 Z" fill="'+color+'"/>'
        +  '<path d="M50 50 L50 95 A45 45 0 0 1 5 50 Z" fill="'+color+'"/>'
        +  '<circle cx="50" cy="50" r="45" fill="none" stroke="'+color+'" stroke-width="2.5"/>';
    }
    return s + '</svg>';
  }

  /* ---------- render ---------- */
  function renderStage(){
    stage.style.background = state.bg;
    document.documentElement.style.background = state.bg;
    document.body.style.background = state.bg;
    var html = '';
    var W = stage.clientWidth || window.innerWidth;
    var H = stage.clientHeight || window.innerHeight;
    var markerSize = state.size * (state.pattern === 'single' ? 4 : 1);
    patternPoints(state.pattern, state.density, W, H).forEach(function(p){
      html += '<div class="marker" style="left:'+p[0]+'%;top:'+p[1]+'%;width:'+markerSize+'px;height:'+markerSize+'px">'
            + markerSVG(state.type, state.mk) + '</div>';
    });
    stage.innerHTML = html;
  }
  window.addEventListener('resize', renderStage);

  function swatchRow(container, key, pickerEl, customKey){
    container.innerHTML = '';
    COLORS.forEach(function(c){
      var b = document.createElement('button');
      b.className = 'swatch' + (state[key] === c ? ' sel' : '');
      b.style.background = c;
      b.setAttribute('aria-label', c);
      b.addEventListener('click', function(){
        state[key] = c; save(); renderStage(); renderControls();
      });
      container.appendChild(b);
    });
    var rb = document.createElement('div');
    var isCustom = COLORS.indexOf(state[key]) === -1;
    rb.className = 'swatch rainbow' + (isCustom ? ' sel' : '');
    if (/^#[0-9a-fA-F]{6}$/.test(state[customKey])) pickerEl.value = state[customKey];
    pickerEl.setAttribute('aria-label', 'Custom color');
    rb.appendChild(pickerEl);
    container.appendChild(rb);
  }

  function renderControls(){
    swatchRow(document.getElementById('bgRow'), 'bg', bgPicker, 'customBg');
    swatchRow(document.getElementById('mkRow'), 'mk', mkPicker, 'customMk');

    var tr = document.getElementById('typeRow');
    tr.innerHTML = '';
    TYPES.forEach(function(t){
      var b = document.createElement('button');
      b.className = 'typeBtn' + (state.type === t ? ' sel' : '');
      b.setAttribute('aria-label', t);
      b.innerHTML = markerSVG(t, '#ffffff');
      b.addEventListener('click', function(){
        state.type = t; save(); renderStage(); renderControls();
      });
      tr.appendChild(b);
    });

    sizeSlider.value = state.size;
    sizeVal.textContent = state.size + ' px';

    densitySlider.value = state.density;
    densityVal.textContent = state.density + '×' + state.density;

    var pg = document.getElementById('patGrid');
    pg.innerHTML = '';
    PATTERN_ORDER.forEach(function(name){
      var b = document.createElement('button');
      b.className = 'patBtn' + (state.pattern === name ? ' sel' : '');
      b.setAttribute('aria-label', name);
      var inner = '';
      PATTERN_MOTIFS[name].forEach(function(p){
        inner += '<span class="pm" style="left:'+p[0]+'%;top:'+p[1]+'%">'
               + markerSVG('cross', '#c6f52f') + '</span>';
      });
      b.innerHTML = inner;
      b.addEventListener('click', function(){
        state.pattern = name; save(); renderStage(); renderControls();
      });
      pg.appendChild(b);
    });
  }

  /* ---------- panel ---------- */
  function openPanel(){
    panel.classList.add('open');
    scrim.style.display = 'block';
  }
  function closePanel(){
    panel.classList.remove('open');
    scrim.style.display = 'none';
  }

  /* ---------- toast ---------- */
  var toastTimer = null;
  function toast(html, ms){
    toastEl.innerHTML = html;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, ms || 2200);
  }

  /* ---------- lock ---------- */
  function setLocked(v){
    locked = v;
    if (locked){
      closePanel();
      toast('<span class="lock">&#128274;</span>&nbsp; Locked &mdash; 3-finger tap to unlock');
      if (kbActive) setTimeout(function(){ kb.focus({preventScroll:true}); }, 60);
    } else {
      toast('<span class="lock">&#128275;</span>&nbsp; Unlocked');
    }
  }

  document.addEventListener('touchstart', function(e){
    if (e.touches.length >= 3){
      lastMulti = Date.now();
      e.preventDefault();
      setLocked(!locked);
    }
  }, {passive:false});

  /* block scroll / pinch on the stage */
  stage.addEventListener('touchmove', function(e){ e.preventDefault(); }, {passive:false});
  scrim.addEventListener('touchmove', function(e){ e.preventDefault(); }, {passive:false});
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });

  /* ---------- interactions ---------- */
  function stageTap(){
    if (Date.now() - lastMulti < 600) return;
    if (locked) return;
    if (kbActive){
      kbActive = false;
      kb.blur();
      hideFakeKB();
      return;
    }
    openPanel();
  }
  stage.addEventListener('click', stageTap);
  scrim.addEventListener('click', function(){
    if (Date.now() - lastMulti < 600 || locked) return;
    if (Date.now() - pickerGuard < 1000) return;
    closePanel();
  });

  document.getElementById('closeBtn').addEventListener('click', closePanel);
  document.getElementById('panelHead').addEventListener('click', function(e){
    if (e.target.closest('#closeBtn')) return;
    closePanel();
  });

  sizeSlider.addEventListener('input', function(){
    state.size = +sizeSlider.value;
    sizeVal.textContent = state.size + ' px';
    renderStage();
  });
  sizeSlider.addEventListener('change', save);

  densitySlider.addEventListener('input', function(){
    state.density = +densitySlider.value;
    densityVal.textContent = state.density + '×' + state.density;
    renderStage();
  });
  densitySlider.addEventListener('change', save);

  /* while the native color picker is open, its taps leak "click" events to the
     page underneath — keep the settings panel from closing on those */
  var pickerGuard = 0;
  ['click','focus','input','change'].forEach(function(ev){
    bgPicker.addEventListener(ev, function(){ pickerGuard = Date.now(); });
    mkPicker.addEventListener(ev, function(){ pickerGuard = Date.now(); });
  });

  /* live preview. NEVER rebuild the swatch rows while the picker is in use:
     a rebuild re-parents the <input type="color">, which dismisses the native
     picker (iOS fires "change" on every selection, not just on close).
     Only the selection rings are updated, without touching the DOM structure. */
  function ringRainbow(picker){
    var rain = picker.parentElement;
    if (!rain || !rain.classList.contains('rainbow')) return;
    var sibs = rain.parentElement.querySelectorAll('.swatch');
    for (var i = 0; i < sibs.length; i++) sibs[i].classList.remove('sel');
    rain.classList.add('sel');
  }
  /* tapping the rainbow swatch applies the stored custom color right away —
     the wheel then only fine-tunes it (input never fires if nothing changes) */
  bgPicker.addEventListener('click', function(){
    state.bg = state.customBg = bgPicker.value; save(); renderStage(); ringRainbow(bgPicker);
  });
  mkPicker.addEventListener('click', function(){
    state.mk = state.customMk = mkPicker.value; save(); renderStage(); ringRainbow(mkPicker);
  });
  bgPicker.addEventListener('input', function(){
    state.bg = state.customBg = bgPicker.value; save(); renderStage(); ringRainbow(bgPicker);
  });
  mkPicker.addEventListener('input', function(){
    state.mk = state.customMk = mkPicker.value; save(); renderStage(); ringRainbow(mkPicker);
  });

  /* ---------- keyboard ---------- */
  document.getElementById('kbBtn').addEventListener('click', function(){
    kbActive = true;
    hideFakeKB();
    closePanel();
    kb.style.pointerEvents = 'auto';
    kb.focus({preventScroll:true});
  });
  kb.addEventListener('blur', function(){
    if (locked && kbActive){
      setTimeout(function(){ if (locked && kbActive) kb.focus({preventScroll:true}); }, 60);
    } else {
      kbActive = false;
      kb.style.pointerEvents = 'none';
    }
  });
  kb.addEventListener('input', function(){ kb.value = ''; });

  /* ---------- replica iOS keyboard (no accessory capsule) ---------- */
  var kbLayout = 'letters', kbShift = true, capsLock = false, lastShiftTap = 0;

  function shiftIcon(){
    var fill = (kbShift || capsLock) ? 'currentColor' : 'none';
    var lock = capsLock ? '<path d="M9 20.5h6" stroke-linecap="round"/>' : '';
    return '<svg viewBox="0 0 24 24" fill="'+fill+'" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><path d="M12 3.5 4.5 11H8.5V16H15.5V11H19.5Z"/>'+lock+'</svg>';
  }
  var KB_ICONS = {
    back: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M8.4 5h10.1A1.5 1.5 0 0 1 20 6.5v11a1.5 1.5 0 0 1-1.5 1.5H8.4l-5.6-7z" stroke-linejoin="round"/><path d="M11.6 9.6l4.8 4.8m0-4.8l-4.8 4.8" stroke-linecap="round"/></svg>',
    ret: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7.5"/></svg>',
    emoji: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M8.5 14a4.5 4.5 0 0 0 7 0"/><circle cx="9" cy="9.7" r="0.9" fill="currentColor" stroke="none"/><circle cx="15" cy="9.7" r="0.9" fill="currentColor" stroke="none"/></svg>',
    mic: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><rect x="9.2" y="2.8" width="5.6" height="11" rx="2.8"/><path d="M5.5 11.5a6.5 6.5 0 0 0 13 0M12 18v3.4"/></svg>'
  };

  function keyBtn(label, cls, action){
    return '<button class="key'+(cls ? ' '+cls : '')+'"'
         + (action ? ' data-a="'+action+'"' : '')
         + '>'+label+'</button>';
  }
  function charRow(chars){
    return '<div class="kbrow">' + chars.map(function(c){ return keyBtn(c); }).join('') + '</div>';
  }
  function renderKB(){
    var rows = '';
    if (kbLayout === 'letters'){
      var up = kbShift || capsLock;
      var f = function(c){ return up ? c.toUpperCase() : c; };
      rows += charRow('azertyuiop'.split('').map(f));
      rows += charRow('qsdfghjklm'.split('').map(f));
      rows += '<div class="kbrow">'
            + keyBtn(shiftIcon(), 'dim wide', 'shift')
            + ['w','x','c','v','b','n','´'].map(function(c){ return keyBtn(f(c)); }).join('')
            + keyBtn(KB_ICONS.back, 'dim wide', 'back')
            + '</div>';
    } else if (kbLayout === 'numbers'){
      rows += charRow('1234567890'.split(''));
      rows += charRow(['-','/',':',';','(',')','€','&','@','"']);
      rows += '<div class="kbrow">'
            + keyBtn('#+=', 'dim wide', 'sym')
            + ['.',',','?','!','´'].map(function(c){ return keyBtn(c); }).join('')
            + keyBtn(KB_ICONS.back, 'dim wide', 'back')
            + '</div>';
    } else {
      rows += charRow('[]{}#%^*+='.split(''));
      rows += charRow(['_','\\','|','~','&lt;','&gt;','$','£','¥','·']);
      rows += '<div class="kbrow">'
            + keyBtn('123', 'dim wide', 'sym')
            + ['.',',','?','!','´'].map(function(c){ return keyBtn(c); }).join('')
            + keyBtn(KB_ICONS.back, 'dim wide', 'back')
            + '</div>';
    }
    rows += '<div class="kbrow">'
          + keyBtn(kbLayout === 'letters' ? '123' : 'ABC', 'dim mode', 'mode')
          + keyBtn('', 'space', 'space')
          + keyBtn(KB_ICONS.ret, 'ret', 'ret')
          + '</div>';
    rows += '<div class="kbextras">' + KB_ICONS.emoji + KB_ICONS.mic + '</div>';
    fakekb.innerHTML = rows;
  }
  function showFakeKB(){
    kbLayout = 'letters'; kbShift = true; capsLock = false;
    renderKB();
    fakekb.classList.add('show');
  }
  function hideFakeKB(){ fakekb.classList.remove('show'); }

  /* iOS 26 key pop: one continuous shape — a big rounded head floating one row
     up, flowing into a stem that covers the pressed key itself */
  function popBalloon(keyEl){
    var kr = keyEl.getBoundingClientRect(), fr = fakekb.getBoundingClientRect();
    var kw = kr.width, kh = kr.height;
    var W = kw * 1.5, H = kh * 1.7, gap = 6, TH = H + gap + kh;
    var left = kr.left - fr.left + kw/2 - W/2;
    left = Math.max(3, Math.min(fr.width - W - 3, left));
    /* keep the stem glued to the key even when the head is clamped at an edge */
    var sx = (kr.left - fr.left) - left;
    sx = Math.max(0, Math.min(W - kw, sx));
    var top = kr.top - fr.top - H - gap;
    var R = 20, r = 13, c = 12;
    var p = 'M '+R+',0 L '+(W-R)+',0 Q '+W+',0 '+W+','+R
          + ' L '+W+','+(H-c)
          + ' C '+W+','+H+' '+(sx+kw)+','+H+' '+(sx+kw)+','+(H+c)
          + ' L '+(sx+kw)+','+(TH-r)
          + ' Q '+(sx+kw)+','+TH+' '+(sx+kw-r)+','+TH
          + ' L '+(sx+r)+','+TH
          + ' Q '+sx+','+TH+' '+sx+','+(TH-r)
          + ' L '+sx+','+(H+c)
          + ' C '+sx+','+H+' 0,'+H+' 0,'+(H-c)
          + ' L 0,'+R+' Q 0,0 '+R+',0 Z';
    var b = document.createElement('div');
    b.className = 'kpop';
    b.style.cssText = 'left:'+left+'px;top:'+top+'px;width:'+W+'px;height:'+TH+'px;';
    b.innerHTML = '<svg width="'+W+'" height="'+TH+'" viewBox="0 0 '+W+' '+TH+'" style="position:absolute;left:0;top:0;filter:drop-shadow(0 2px 5px rgba(0,0,0,.22))"><path d="'+p+'" style="fill:var(--popBg)"/></svg>'
                + '<span style="position:absolute;left:0;top:0;width:'+W+'px;height:'+H+'px;display:flex;align-items:center;justify-content:center;font-size:'+Math.round(kh*1.05)+'px;color:var(--keyText)">'+keyEl.textContent+'</span>';
    fakekb.appendChild(b);
    return b;
  }

  function doKey(keyEl){
    var a = keyEl.getAttribute('data-a');
    if (a === 'shift'){
      var now = Date.now();
      if (now - lastShiftTap < 350){ capsLock = true; kbShift = true; }
      else { capsLock = false; kbShift = !kbShift; }
      lastShiftTap = now;
      renderKB();
    } else if (a === 'mode'){
      kbLayout = (kbLayout === 'letters') ? 'numbers' : 'letters';
      kbShift = false; capsLock = false;
      renderKB();
    } else if (a === 'sym'){
      kbLayout = (kbLayout === 'numbers') ? 'symbols' : 'numbers';
      renderKB();
    } else if (!a && kbLayout === 'letters' && kbShift && !capsLock){
      /* like iOS: shift releases after one letter */
      setTimeout(function(){ kbShift = false; renderKB(); }, 120);
    }
  }

  /* per-touch handling so two-thumb typing animates each key independently */
  var kbTouches = {};
  fakekb.addEventListener('touchstart', function(e){
    for (var i = 0; i < e.changedTouches.length; i++){
      var t = e.changedTouches[i];
      var el = document.elementFromPoint(t.clientX, t.clientY);
      var key = el && el.closest ? el.closest('.key') : null;
      if (!key) continue;
      key.classList.add('press');
      var entry = {key: key, pop: null};
      if (!key.getAttribute('data-a') && key.textContent) entry.pop = popBalloon(key);
      kbTouches[t.identifier] = entry;
    }
    if (e.touches.length < 3) e.preventDefault();
  }, {passive:false});
  function kbRelease(e){
    for (var i = 0; i < e.changedTouches.length; i++){
      var entry = kbTouches[e.changedTouches[i].identifier];
      if (!entry) continue;
      entry.key.classList.remove('press');
      if (entry.pop && entry.pop.parentNode) entry.pop.parentNode.removeChild(entry.pop);
      if (e.type === 'touchend') doKey(entry.key);
      delete kbTouches[e.changedTouches[i].identifier];
    }
  }
  fakekb.addEventListener('touchend', kbRelease);
  fakekb.addEventListener('touchcancel', kbRelease);
  /* mouse fallback for desktop testing */
  fakekb.addEventListener('mousedown', function(e){
    if ('ontouchstart' in window) return;
    var key = e.target.closest('.key');
    if (!key) return;
    key.classList.add('press');
    var pop = (!key.getAttribute('data-a') && key.textContent) ? popBalloon(key) : null;
    var up = function(){
      key.classList.remove('press');
      if (pop && pop.parentNode) pop.parentNode.removeChild(pop);
      doKey(key);
      document.removeEventListener('mouseup', up);
    };
    document.addEventListener('mouseup', up);
  });

  document.getElementById('kbFakeBtn').addEventListener('click', function(){
    kb.blur();
    kbActive = true;
    closePanel();
    showFakeKB();
  });

  /* ---------- keep screen awake ---------- */
  var wakeLock = null;
  function requestWake(){
    if (!('wakeLock' in navigator)) return;
    navigator.wakeLock.request('screen').then(function(w){ wakeLock = w; }).catch(function(){});
  }
  document.addEventListener('visibilitychange', function(){
    if (document.visibilityState === 'visible') requestWake();
  });
  document.addEventListener('click', function once(){
    requestWake();
    document.removeEventListener('click', once);
  });

  /* ---------- init ---------- */
  renderStage();
  renderControls();
  if (firstRun){
    setTimeout(function(){
      toast('Tap: settings &nbsp;&middot;&nbsp; 3-finger tap: lock', 3500);
    }, 600);
  }
})();
</script>
</body>
</html>
